# Nginx reverse proxy configuration for trust.xyz analytics
# Place this in /etc/nginx/sites-available/analytics.trust.xyz
# Then: ln -s /etc/nginx/sites-available/analytics.trust.xyz /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: nginx -s reload

upstream umami_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Rate limiting zone: 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=analytics_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=crawler_limit:10m rate=50r/s;

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name analytics.trust.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.trust.xyz;

    # SSL certificates (generated by certbot)
    ssl_certificate /etc/letsencrypt/live/analytics.trust.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.trust.xyz/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Content Security Policy (strict)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    gzip_disable "MSIE [1-6]\.";

    # Logging
    access_log /var/log/nginx/analytics.trust.xyz.access.log;
    error_log /var/log/nginx/analytics.trust.xyz.error.log warn;

    # Root location
    root /var/www/analytics.trust.xyz;

    # Main application proxy (rate limited)
    location / {
        limit_req zone=analytics_limit burst=20 nodelay;

        proxy_pass http://umami_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Tracking script endpoint (higher rate limit for crawler traffic)
    location ~ ^/api/collect {
        limit_req zone=crawler_limit burst=100 nodelay;

        proxy_pass http://umami_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Crawler log proxy (Node.js server on port 3001)
    location /crawlers/log {
        limit_req zone=crawler_limit burst=100 nodelay;

        proxy_pass http://127.0.0.1:3001/log;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }
}
