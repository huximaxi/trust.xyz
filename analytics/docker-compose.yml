version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-umami}
      POSTGRES_USER: ${DB_USER:-umami}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-umami_secure_pass_change_me}
    volumes:
      - umami-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-umami}"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://umami:umami_secure_pass_change_me@postgres:5432/umami}
      DATABASE_TYPE: postgresql
      HASH_SALT: ${APP_SECRET:-change_me_32_char_random_secret}
      TRACKER_SCRIPT_NAME: ${TRACKER_SCRIPT_NAME:-beacon}
      DISABLE_TELEMETRY: ${DISABLE_TELEMETRY:-1}
      FORCE_SSL: 0
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - umami-app-data:/app/public/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  umami-postgres-data:
    driver: local
  umami-app-data:
    driver: local

networks:
  default:
    driver: bridge
